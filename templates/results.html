<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Recommendation</title>
    <style>
        body {
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        padding: 40px;
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(
        to bottom,
        rgba(0, 253, 240, 0.406),  /* Light shade at top */
        rgba(0, 75, 72, 0.532),
        rgba(0, 0, 0.775) /* Dark shade at bottom */
        ),
        url('/static/ocean.png');
        background-size: cover;        /* Stretches image to fill */
        background-attachment: fixed;  /* Keeps it still when scrolling */
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .result-box {
        background-color: rgba(255, 255, 255, 0.1) !important;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2); /* Soft glass border */
        border-radius: 30px;
        padding: 60px 40px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
    }

        h1 {
            color: #ffffff;
            font-size: 28px;
            margin-top: 30px;
        }

        h2 {
            color: #ffffff;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .meta {
            color: #ffffff;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .skills-list {
            font-family: monospace;
            color: #ffffff;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background-color: #bfece0;
            color: rgba(2, 48, 45);
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #005d5e;
            color: #ffffff;
        }

        hr {
            border: none;
            height: 1px;
            background-color: #006c62;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="result-box">
        <h2>Based on Your Profile...</h2>
        <p class="meta">Your skills: <span class="skills-list">{{ user_skills }}</span></p>
        <p class="meta">Your interests: <span class="skills-list">{{ user_interests }}</span></p>
        <p class="meta"><strong>We Recommend</strong></p>
        <h1>{{ career }}</h1>
    </div>
    <a href="{{ url_for('home') }}#recommendation">Try Again</a>
</body>
</html>
